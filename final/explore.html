<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browse U.S. national parks, filter by state and activity, and discover your next trail destination.">
    <meta name="author" content="Parker Jones">
    <meta property="og:title" content="National Parks & Trails | Explore">
    <meta property="og:description" content="Browse and filter national park data to find your next adventure.">
    <meta property="og:image" content="https://aparkerjones.github.io/wdd231/images/profile.jpg">
    <meta property="og:url" content="https://aparkerjones.github.io/wdd231/final/explore.html">
    <title>National Parks & Trails | Explore</title>
    <link rel="icon" href="../images/lightning.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/final.css">
    <script src="../scripts/navigation.js" defer></script>
    <script src="../scripts/date.js" defer></script>
    <script src="./scripts/explore.js" type="module" defer></script>
</head>
<body>
    <header>
        <div class="wrapper header-bar">
            <div class="brand">
                <img src="../images/site-logo.svg" alt="Site logo" width="48" height="48">
                <span>National Parks &amp; Trails</span>
            </div>
            <button id="menuButton" aria-expanded="false" aria-controls="primaryNav" aria-label="Open site navigation">☰</button>
            <nav aria-label="Primary navigation">
                <ul id="primaryNav">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="explore.html" class="active">Explore</a></li>
                    <li><a href="plan.html">Plan</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="wrapper">
        <h1>Explore</h1>
        <section>
            <h2>Park Discovery</h2>
            <p id="dataStatus" class="sr-only" aria-live="polite">Loading parks.</p>

            <form class="explore-controls" aria-label="Park filter controls">
                <label for="parkSearch">Search</label>
                <input id="parkSearch" name="parkSearch" type="search" placeholder="Search by park name, state, or keyword">

                <label for="stateFilter">State</label>
                <select id="stateFilter" name="stateFilter">
                    <option value="all">All states</option>
                </select>

                <label for="activityFilter">Activity</label>
                <select id="activityFilter" name="activityFilter">
                    <option value="all">All activities</option>
                </select>

                <label for="sortFilter">Sort</label>
                <select id="sortFilter" name="sortFilter">
                    <option value="name">Name (A-Z)</option>
                    <option value="state">State (A-Z)</option>
                </select>

                <button id="resetFilters" type="button" class="btn btn-secondary">Reset Filters</button>
            </form>

            <p id="resultsSummary" class="results-summary" aria-live="polite">Showing 0 parks.</p>

            <div id="parksContainer" class="parks-grid"></div>
        </section>
    </main>

    <dialog id="parkDetailsDialog" aria-labelledby="detailTitle" aria-modal="true">
        <article class="modal-content">
            <h2 id="detailTitle">Park Details</h2>
            <p id="detailMeta" class="park-card-meta"></p>
            <p id="detailDescription"></p>
            <p><strong>Activities:</strong> <span id="detailActivities"></span></p>
            <p><a id="detailWebsite" href="#" target="_blank" rel="noopener noreferrer">Visit official park page</a></p>
            <button id="closeDialog" type="button" class="btn btn-primary">Close</button>
        </article>
    </dialog>

    <footer>
        <div class="wrapper footer-content">
            <nav class="social-links" aria-label="My social links">
                <a href="https://github.com/aparkerjones/wdd231" target="_blank" rel="noopener noreferrer" aria-label="Visit my GitHub page">
                    <img src="../images/icon-github.svg" alt="GitHub icon" width="24" height="24">
                </a>
                <a href="https://www.linkedin.com/in/a-parker-jones/" target="_blank" rel="noopener noreferrer" aria-label="Visit my LinkedIn profile">
                    <img src="../images/icon-linkedin.svg" alt="LinkedIn icon" width="24" height="24">
                </a>
                <a href="https://www.instagram.com/aparkerj/" target="_blank" rel="noopener noreferrer" aria-label="Visit my Instagram profile">
                    <img src="../images/icon-instagram.svg" alt="Instagram icon" width="24" height="24">
                </a>
                <a href="https://www.facebook.com/parker.jones.376/" target="_blank" rel="noopener noreferrer" aria-label="Visit my Facebook profile">
                    <img src="../images/icon-facebook.svg" alt="Facebook icon" width="24" height="24">
                </a>
            </nav>

            <p class="footer-links">
                <a href="attributions.html">Attributions</a> |
                <a href="video.html">Trip Video</a>
            </p>

            <p>&copy; <span id="currentyear"></span> Parker Jones | Idaho, United States</p>

            <p id="lastModified"></p>
        </div>
    </footer>
</body>
</html>
